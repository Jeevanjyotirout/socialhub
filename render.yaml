services:
  - type: web
    name: socialhub-api
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://YOUR_VERCEL_APP.vercel.app
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////var/data/socialhub.db
    disk:
      name: socialhub-data
      mountPath: /var/data
      sizeGB: 1
    autoDeploy: true
